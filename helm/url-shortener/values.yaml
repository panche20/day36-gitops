# ── App ────────────────────────────────────────────
global:
    namespace: url-shortener
app:
    name: url-shortener
    replicas: 2
    image: ghcr.io/panche20/url-shortener
    tag: v1.0.4
    port: 8000
    resources:
        requests:
            memory: 128Mi
            cpu: 100m
        limits:
            memory: 256Mi
            cpu: 500m
    probes:
        liveness:
            httpGet:
                path: /health
                port: 8000
            initialDelaySeconds: 15
            periodSeconds: 10
            failureThreshold: 3
        readiness:
            httpGet:
                path: /ready
                port: 8000
            initialDelaySeconds: 5
            periodSeconds: 5
            failureThreshold: 3
# ── Redis ──────────────────────────────────────────
redis:
    replicas: 1
    image: redis:7-alpine
    port: 6379
    password: strongpassword123
    secretKey: super-secret-key
    persistence:
        enabled: true
        size: 1Gi
        storageClass: standard
    resources:
        requests:
            memory: 64Mi
            cpu: 50m
        limits:
            memory: 128Mi
            cpu: 250m
# ── Ingress ────────────────────────────────────────
ingress:
    enabled: true
    className: nginx
    host: url-shortener.local
    annotations:
        nginx.ingress.kubernetes.io/ssl-redirect: "false"
        nginx.ingress.kubernetes.io/limit-rps: "10"
        nginx.ingress.kubernetes.io/proxy-body-size: 1m
        nginx.ingress.kubernetes.io/proxy-read-timeout: "30"
    tls:
        enabled: false
        secretName: url-shortener-tls
# Nginx settings
nginx:
    enabled: true
    replicas: 1
    image: nginx:alpine
    port: 80
    service:
        type: ClusterIP
        port: 80
# ── Config ─────────────────────────────────────────
config:
    logLevel: info
    maxUrlLength: "2048"
    enableRateLimit: "true"
# ── Network Policy ─────────────────────────────────
networkPolicy:
    enabled: true
# ── Autoscaling ────────────────────────────────────
autoscaling:
    enabled: false
    minReplicas: 2
    maxReplicas: 10
    targetCPUUtilizationPercentage: 70
    targetMemoryUtilizationPercentage: 80
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ .Release.Name }}-config
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "url-shortener.labels" . | nindent 4 }}
data:
  REDIS_HOST: {{ include "url-shortener.redisName" . | quote }}
  REDIS_PORT: {{ .Values.redis.port | quote }}
  LOG_LEVEL: {{ .Values.config.logLevel | quote }}
  MAX_URL_LENGTH: {{ .Values.config.maxUrlLength | quote }}
  ENABLE_RATE_LIMIT: {{ .Values.config.enableRateLimit | quote }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "url-shortener.appName" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "url-shortener.labels" . | nindent 4 }}
    component: app
  annotations:
    helm.sh/chart: {{ .Chart.Name }}-{{ .Chart.Version }}
spec:
  replicas: {{ .Values.app.replicas }}
  selector:
    matchLabels:
      {{- include "url-shortener.selectorLabels" . | nindent 6 }}
      component: app
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
      maxSurge: 1
  template:
    metadata:
      labels:
        {{- include "url-shortener.selectorLabels" . | nindent 8 }}
        component: app
      annotations:
        checksum/config: {{ include (print $.Template.BasePath "/configmap.yaml") . | sha256sum }}
        checksum/secret: {{ include (print $.Template.BasePath "/secret.yaml") . | sha256sum }}
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
      containers:
      - name: app
        image: "{{ .Values.app.image }}:{{ .Values.app.tag }}"
        ports:
        - containerPort: {{ .Values.app.port }}
        envFrom:
        - configMapRef:
            name: {{ .Release.Name }}-config
        env:
        - name: REDIS_PASSWORD
          valueFrom:
            secretKeyRef:
              name: {{ .Release.Name }}-secrets
              key: REDIS_PASSWORD
        - name: SECRET_KEY
          valueFrom:
            secretKeyRef:
              name: {{ .Release.Name }}-secrets
              key: SECRET_KEY
        resources:
          {{- toYaml .Values.app.resources | nindent 10 }}
        livenessProbe:
          httpGet:
            path: {{ .Values.app.probes.liveness.path }}
            port: {{ .Values.app.port }}
          initialDelaySeconds: {{ .Values.app.probes.liveness.initialDelaySeconds }}
          periodSeconds: {{ .Values.app.probes.liveness.periodSeconds }}
          failureThreshold: {{ .Values.app.probes.liveness.failureThreshold }}
        readinessProbe:
          httpGet:
            path: {{ .Values.app.probes.readiness.path }}
            port: {{ .Values.app.port }}
          initialDelaySeconds: {{ .Values.app.probes.readiness.initialDelaySeconds }}
          periodSeconds: {{ .Values.app.probes.readiness.periodSeconds }}
          failureThreshold: {{ .Values.app.probes.readiness.failureThreshold }}
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          capabilities:
            drop: ["ALL"]
        volumeMounts:
        - name: tmp
          mountPath: /tmp
      volumes:
      - name: tmp
        emptyDir: {}